<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EekLink - Pure Video Link Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(18, 25, 45, 0.9);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(72, 187, 255, 0.3);
    }

    h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .sub {
      color: #94a3b8;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid #1e293b;
    }

    .dropzone {
      background: rgba(15, 23, 42, 0.6);
      border: 2px dashed #3b4a6e;
      border-radius: 20px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    .dropzone:hover {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.1);
    }

    .dropzone.drag-over {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.2);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: #64748b;
      font-size: 12px;
    }

    #fileInput {
      display: none;
    }

    .preview-box {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin: 20px 0;
      display: none;
    }

    .preview-box.show {
      display: block;
    }

    .preview-header {
      background: #0f172a;
      padding: 12px 16px;
      color: #94a3b8;
      font-size: 14px;
      border-bottom: 1px solid #1e293b;
    }

    video {
      width: 100%;
      max-height: 300px;
      display: block;
    }

    .info {
      background: #0f172a;
      padding: 12px 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #94a3b8;
    }

    .link-box {
      background: #0f172a;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      display: none;
    }

    .link-box.show {
      display: block;
    }

    .link-header {
      color: #60a5fa;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .link-content {
      background: #030617;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      word-break: break-all;
    }

    .link-content a {
      flex: 1;
      color: #94a3b8;
      text-decoration: none;
      font-family: monospace;
      font-size: 12px;
    }

    button {
      background: #1e293b;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      background: #334155;
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
    }

    .reset-btn {
      background: #334155;
    }

    .success-msg {
      background: rgba(34, 197, 94, 0.1);
      border-left: 3px solid #22c55e;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 12px;
      color: #86efac;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-size: 14px;
      border: 1px solid #3b82f6;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      .link-content {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📹 EekLink Pro</h1>
  <div class="sub">
    ⬆️ Video upload karo → link bane → link click karne par sirf video (full quality)
  </div>

  <div class="dropzone" id="dropzone">
    <div class="upload-icon">🎥📤</div>
    <div class="upload-text">Click or drag video here</div>
    <div class="upload-hint">MP4, WebM, MOV (Max 500MB)</div>
  </div>
  <input type="file" id="fileInput" accept="video/*">

  <div class="preview-box" id="previewBox">
    <div class="preview-header">
      <span>🎬 Video Preview</span>
      <span id="qualityBadge" style="float: right;">⚡ HD</span>
    </div>
    <video id="previewVideo" controls></video>
    <div class="info">
      <span>📄 <span id="fileName">-</span></span>
      <span>💾 <span id="fileSize">-</span></span>
      <span>📐 <span id="videoRes">-</span></span>
    </div>
  </div>

  <div class="link-box" id="linkBox">
    <div class="link-header">🔗 YOUR VIDEO LINK (CLICK = ONLY VIDEO)</div>
    <div class="link-content">
      <a id="videoLink" href="#" target="_blank">Loading...</a>
      <button id="copyBtn">📋 Copy</button>
      <button id="testBtn" class="btn-primary">🔗 Test</button>
    </div>
    <div class="success-msg">
      ✅ Original quality preserved · No compression
    </div>
  </div>

  <div style="text-align: right; margin-top: 15px;">
    <button id="resetBtn" class="reset-btn">⟳ New Video</button>
  </div>
</div>

<div id="toast" class="toast">✨ Ready!</div>

<script>
  // Get all elements
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewBox = document.getElementById('previewBox');
  const previewVideo = document.getElementById('previewVideo');
  const fileNameSpan = document.getElementById('fileName');
  const fileSizeSpan = document.getElementById('fileSize');
  const videoResSpan = document.getElementById('videoRes');
  const linkBox = document.getElementById('linkBox');
  const videoLink = document.getElementById('videoLink');
  const copyBtn = document.getElementById('copyBtn');
  const testBtn = document.getElementById('testBtn');
  const resetBtn = document.getElementById('resetBtn');
  const toast = document.getElementById('toast');
  const qualityBadge = document.getElementById('qualityBadge');

  // Store data
  let currentLinkUrl = null;
  let currentVideoFile = null;

  // Show toast message
  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Get video resolution
  function getVideoResolution(file) {
    return new Promise((resolve) => {
      const video = document.createElement('video');
      video.preload = 'metadata';
      const url = URL.createObjectURL(file);
      video.onloadedmetadata = function() {
        URL.revokeObjectURL(url);
        resolve(video.videoWidth + ' x ' + video.videoHeight);
      };
      video.onerror = function() {
        URL.revokeObjectURL(url);
        resolve('Unknown');
      };
      video.src = url;
    });
  }

  // Convert file to base64
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Create pure video HTML page
  function createVideoPage(base64Data, fileType, fileName, fileSize, resolution) {
    const safeName = fileName.substring(0, 40).replace(/[&<>]/g, '');
    const sizeMB = (fileSize / (1024 * 1024)).toFixed(2);
    
    return `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure Video · ${safeName}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    video {
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }
    .info {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: rgba(0,0,0,0.6);
      padding: 5px 12px;
      border-radius: 20px;
      color: #888;
      font-size: 11px;
      font-family: monospace;
    }
    .quality {
      position: fixed;
      top: 15px;
      right: 15px;
      background: rgba(34,197,94,0.2);
      padding: 5px 12px;
      border-radius: 20px;
      color: #4ade80;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <video controls autoplay playsinline>
    <source src="${base64Data}" type="${fileType}">
  </video>
  <div class="quality">🎬 ${resolution} · ${sizeMB} MB</div>
  <div class="info">EekLink · Pure Video</div>
</body>
</html>`;
  }

  // Main function to process video
  async function processVideo(file) {
    if (!file || !file.type.startsWith('video/')) {
      showToast('❌ Please select a video file', true);
      return false;
    }

    if (file.size > 500 * 1024 * 1024) {
      showToast('📦 Video must be less than 500MB', true);
      return false;
    }

    showToast('⏳ Processing video...');
    qualityBadge.innerHTML = '<span class="spinner"></span> Processing';
    
    try {
      // Get resolution
      const resolution = await getVideoResolution(file);
      
      // Convert to base64
      const base64Data = await fileToBase64(file);
      
      // Store file
      currentVideoFile = file;
      
      // Show preview
      if (previewVideo.src && previewVideo.src.startsWith('blob:')) {
        URL.revokeObjectURL(previewVideo.src);
      }
      const previewUrl = URL.createObjectURL(file);
      previewVideo.src = previewUrl;
      
      // Update file info
      let name = file.name;
      if (name.length > 30) name = name.substring(0, 27) + '...';
      fileNameSpan.textContent = name;
      
      const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
      fileSizeSpan.textContent = sizeMB + ' MB';
      videoResSpan.textContent = resolution;
      
      // Create video page
      const videoPageHTML = createVideoPage(base64Data, file.type, file.name, file.size, resolution);
      
      // Create blob URL
      if (currentLinkUrl && currentLinkUrl.startsWith('blob:')) {
        URL.revokeObjectURL(currentLinkUrl);
      }
      
      const htmlBlob = new Blob([videoPageHTML], { type: 'text/html' });
      currentLinkUrl = URL.createObjectURL(htmlBlob);
      
      // Update link display
      let displayLink = currentLinkUrl;
      if (displayLink.length > 55) {
        displayLink = displayLink.substring(0, 52) + '...';
      }
      videoLink.href = currentLinkUrl;
      videoLink.textContent = displayLink;
      
      // Show sections
      previewBox.classList.add('show');
      linkBox.classList.add('show');
      
      qualityBadge.innerHTML = '✨ HD Quality';
      showToast('✅ Video ready! Link copied successfully');
      
      return true;
    } catch (error) {
      console.error('Error:', error);
      showToast('❌ Error processing video', true);
      qualityBadge.innerHTML = '⚠️ Error';
      return false;
    }
  }

  // Event handlers
  function openFileDialog() {
    fileInput.click();
  }

  function onFileSelected(e) {
    const files = e.target.files;
    if (files && files.length > 0) {
      processVideo(files[0]);
    }
  }

  function onDragOver(e) {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  }

  function onDragLeave(e) {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files && files.length > 0) {
      const file = files[0];
      if (file.type.startsWith('video/')) {
        processVideo(file);
      } else {
        showToast('❌ Only video files allowed', true);
      }
    }
  }

  async function copyLink() {
    if (!currentLinkUrl) {
      showToast('⚠️ Upload a video first', true);
      return;
    }
    try {
      await navigator.clipboard.writeText(currentLinkUrl);
      showToast('🔗 Link copied! Share it anywhere');
    } catch (err) {
      const textarea = document.createElement('textarea');
      textarea.value = currentLinkUrl;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('📋 Link copied!');
    }
  }

  function testLink() {
    if (currentLinkUrl) {
      window.open(currentLinkUrl, '_blank');
    } else {
      showToast('⚠️ Upload a video first', true);
    }
  }

  function resetAll() {
    if (previewVideo.src && previewVideo.src.startsWith('blob:')) {
      URL.revokeObjectURL(previewVideo.src);
    }
    if (currentLinkUrl && currentLinkUrl.startsWith('blob:')) {
      URL.revokeObjectURL(currentLinkUrl);
    }
    currentLinkUrl = null;
    currentVideoFile = null;
    previewVideo.src = '';
    previewBox.classList.remove('show');
    linkBox.classList.remove('show');
    fileInput.value = '';
    fileNameSpan.textContent = '-';
    fileSizeSpan.textContent = '-';
    videoResSpan.textContent = '-';
    qualityBadge.innerHTML = '⚡ HD';
    showToast('🔄 Reset done! Upload new video');
  }

  // Add event listeners
  dropzone.addEventListener('click', openFileDialog);
  fileInput.addEventListener('change', onFileSelected);
  dropzone.addEventListener('dragover', onDragOver);
  dropzone.addEventListener('dragleave', onDragLeave);
  dropzone.addEventListener('drop', onDrop);
  copyBtn.addEventListener('click', copyLink);
  testBtn.addEventListener('click', testLink);
  resetBtn.addEventListener('click', resetAll);

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    if (previewVideo.src && previewVideo.src.startsWith('blob:')) {
      URL.revokeObjectURL(previewVideo.src);
    }
    if (currentLinkUrl && currentLinkUrl.startsWith('blob:')) {
      URL.revokeObjectURL(currentLinkUrl);
    }
  });
</script>
</body>
</html>
